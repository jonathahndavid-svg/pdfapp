<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>App PDF</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="viewer">

  <!-- Botón menú -->
  <button class="menu-btn" onclick="abrirMenu()">☰</button>

  <!-- Popup -->
  <div id="popup" class="popup">
    <div class="popup-content">
      <button class="close-btn" onclick="cerrarMenu()">✖</button>
      <div id="menu"></div>
    </div>
  </div>

  <!-- Canvas PDF -->
  <canvas id="pdf-render"></canvas>

  <!-- Flechas -->
  <button class="nav left" onclick="anterior()">⬅</button>
  <button class="nav right" onclick="siguiente()">➡</button>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="app.js"></script>

</body>
</html>
